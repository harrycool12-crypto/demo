<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Fit Zone Gym</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%231a6b3a'/><text y='.9em' font-size='72' x='12'>⚡</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #1a3a2a, #0f2027);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 18px;
      padding: 2.5rem 2.8rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    .brand-icon {
      width: 58px; height: 58px;
      background: linear-gradient(135deg, #1a6b3a, #16a34a);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.7rem; color: #fff; margin: 0 auto 1rem;
    }
    .brand-title { font-size: 1.4rem; font-weight: 800; color: #1a3a2a; letter-spacing: .04em; }
    .brand-sub   { font-size: .78rem; color: #6b7280; margin-bottom: 1.8rem; }
    .form-label  { font-weight: 600; font-size: .85rem; color: #374151; }
    .form-control {
      border-radius: 9px; padding: .55rem .9rem;
      border: 1.5px solid #d1d5db; font-size: .9rem;
    }
    .form-control:focus { border-color: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,.15); }
    .btn-login {
      background: linear-gradient(135deg, #1a6b3a, #16a34a);
      color: #fff; border: none; border-radius: 9px;
      padding: .65rem; font-weight: 700; font-size: .95rem;
      width: 100%; margin-top: .5rem; cursor: pointer;
      transition: opacity .15s;
    }
    .btn-login:hover { opacity: .88; }
    .input-icon { position: relative; }
    .input-icon .bi {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: #9ca3af; font-size: 1rem;
    }
    .input-icon .form-control { padding-left: 2.2rem; }
    .footer-note { font-size: .73rem; color: #9ca3af; text-align: center; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center">
      <div class="brand-icon"><i class="bi bi-lightning-fill"></i></div>
      <div class="brand-title">FIT ZONE GYM</div>
      <div class="brand-sub">Management System — Sign In</div>
    </div>

    {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3" style="font-size:.85rem;border-radius:9px">
      <i class="bi bi-exclamation-circle-fill"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" autocomplete="on">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-icon">
          <i class="bi bi-person"></i>
          <input type="text" name="username" class="form-control" placeholder="Enter username"
                 autocomplete="username" required autofocus>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-icon">
          <i class="bi bi-lock"></i>
          <input type="password" name="password" class="form-control" placeholder="Enter password"
                 autocomplete="current-password" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
      </button>
    </form>

    <div class="footer-note">Fit Zone Gym &bull; Offline System &bull; v1.0.0</div>
  </div>
</body>
</html>
